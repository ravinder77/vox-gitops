image:
  repository: AWS_ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/vox-frontend   # ← update
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 2

service:
  type: ClusterIP
  port: 80
  targetPort: 80

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70

probes:
  liveness:
    path: /
    initialDelaySeconds: 10
    periodSeconds: 20
  readiness:
    path: /
    initialDelaySeconds: 5
    periodSeconds: 10

env:
  NODE_ENV: production
  PORT: "3001"

envFromSecret: vox-frontend-secrets   # from platform/security/external-secrets/app-secrets.yaml

serviceMonitor:
  enabled: true
  namespace: monitoring
  interval: 30s
  path: /metrics

pdb:
  enabled: true
  minAvailable: 1

namespaceLabels:
  gateway-access: "true"
