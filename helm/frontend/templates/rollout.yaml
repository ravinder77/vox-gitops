apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "vox-frontend.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vox-frontend.labels" . | nindent 4 }}
  annotations:
    argocd-image-updater.argoproj.io/image-list: frontend={{ .Values.image.repository }}
    argocd-image-updater.argoproj.io/frontend.update-strategy: digest
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: main
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "vox-frontend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "vox-frontend.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
          env:
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ .Values.envFromSecret }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              {{- include "vox-frontend.selectorLabels" . | nindent 14 }}

  strategy:
    canary:
      stableService: {{ include "vox-frontend.fullname" . }}-stable
      canaryService: {{ include "vox-frontend.fullname" . }}-canary
      trafficRouting:
        alb:
          ingress: vox-frontend-route
          servicePort: {{ .Values.service.port }}
      steps:
        - setWeight: 10
        - pause: { duration: 5m }
        - setWeight: 50
        - pause: { duration: 5m }
        - setWeight: 100
      autoPromotionEnabled: true   # frontend auto-promotes after steps
