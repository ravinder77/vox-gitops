{{- if .Values.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "vox-backend.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vox-backend.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: argoproj.io/v1alpha1
    kind: Rollout                             # targets Rollout, not Deployment
    name: {{ include "vox-backend.fullname" . }}
  minReplicas: {{ .Values.hpa.minReplicas }}
  maxReplicas: {{ .Values.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.hpa.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.hpa.targetMemoryUtilizationPercentage }}
{{- end }}

---
{{- if .Values.serviceMonitor.enabled }}
# ServiceMonitor — tells Prometheus (kube-prometheus-stack) to scrape this service
# Requires kube-prometheus-stack CRDs to be installed (monitoring app, wave 3)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "vox-backend.fullname" . }}
  namespace: {{ .Values.serviceMonitor.namespace }}
  labels:
    {{ include "vox-backend.labels" . | nindent 4 }}
    # This label must match kube-prometheus-stack's serviceMonitorSelector
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      {{ include "vox-backend.selectorLabels" . | nindent 6 }}
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  endpoints:
    - port: http
      path: {{ .Values.serviceMonitor.path }}
      interval: {{ .Values.serviceMonitor.interval }}
{{- end }}

---
{{- if .Values.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "vox-backend.fullname" . }}
  namespace: {{ .Release.Namespace }}
spec:
  minAvailable: {{ .Values.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "vox-backend.selectorLabels" . | nindent 6 }}
{{- end }}
