apiVersion: v1
kind: Service
metadata:
  name: {{ include "backend.fullname" . }}-stable
  labels:
    {{ include "backend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
  selector:
    {{ include "backend.selectorLabels" . | nindent 4 }}

---

apiVersion: v1
kind: Service
metadata:
  name: {{ include "backend.fullname" . }}-canary
  labels:
    {{ include "backend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
  selector:
    {{ include "backend.selectorLabels" . | nindent 4 }}