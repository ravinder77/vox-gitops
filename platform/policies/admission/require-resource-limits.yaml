apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: require-resource-limits
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]

  validations:
    # 1️⃣ Containers must have limits
    - expression: >
        object.metadata.namespace == "vox" &&
        object.spec.containers.all(c,
          has(c.resources) &&
          has(c.resources.limits) &&
          has(c.resources.limits.cpu) &&
          has(c.resources.limits.memory)
        )
      message: "All containers must define CPU and memory limits."

    # 2️⃣ Containers must have requests
    - expression: >
        object.metadata.namespace == "vox" &&
        object.spec.containers.all(c,
          has(c.resources) &&
          has(c.resources.requests) &&
          has(c.resources.requests.cpu) &&
          has(c.resources.requests.memory)
        )
      message: "All containers must define CPU and memory requests."

    # 3️⃣ initContainers must have limits
    - expression: >
        !has(object.spec.initContainers) ||
        object.spec.initContainers.all(c,
          has(c.resources) &&
          has(c.resources.limits) &&
          has(c.resources.limits.cpu) &&
          has(c.resources.limits.memory)
        )
      message: "All initContainers must define CPU and memory limits."

    # 4️⃣ initContainers must have requests
    - expression: >
        !has(object.spec.initContainers) ||
        object.spec.initContainers.all(c,
          has(c.resources) &&
          has(c.resources.requests) &&
          has(c.resources.requests.cpu) &&
          has(c.resources.requests.memory)
        )
      message: "All initContainers must define CPU and memory requests."

    # 5️⃣ ephemeralContainers (often missed)
    - expression: >
        !has(object.spec.ephemeralContainers) ||
        object.spec.ephemeralContainers.all(c,
          has(c.resources) &&
          has(c.resources.limits) &&
          has(c.resources.limits.cpu) &&
          has(c.resources.limits.memory) &&
          has(c.resources.requests) &&
          has(c.resources.requests.cpu) &&
          has(c.resources.requests.memory)
        )
      message: "All ephemeralContainers must define CPU and memory requests and limits."
