apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: disallow-latest-tag
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]

  validations:
    # 1. All containers must have a tag OR digest
    - expression: >
        object.metadata.namespace == "vox" &&
        object.spec.containers.all(c,
          c.image.contains(":") || c.image.contains("@sha256:")
        )
      message: "All container images must have a tag or digest (no implicit latest)."

    # 2. Disallow :latest explicitly
    - expression: >
        object.metadata.namespace == "vox" &&
        object.spec.containers.all(c,
          !c.image.endsWith(":latest")
        )
      message: "Container images must not use ':latest' tag."

    # 3. initContainers — same enforcement
    - expression: >
        !has(object.spec.initContainers) ||
        object.spec.initContainers.all(c,
          (c.image.contains(":") || c.image.contains("@sha256:")) &&
          !c.image.endsWith(":latest")
        )
      message: "Init container images must not use ':latest' and must include tag or digest."

    # 4. ephemeralContainers — often missed
    - expression: >
        !has(object.spec.ephemeralContainers) ||
        object.spec.ephemeralContainers.all(c,
          (c.image.contains(":") || c.image.contains("@sha256:")) &&
          !c.image.endsWith(":latest")
        )
      message: "Ephemeral container images must follow tag/digest rules and must not use ':latest'."
