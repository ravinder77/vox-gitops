apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vox-frontend-route
  namespace: vox
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  parentRefs:
    - name: vox-gateway
      namespace: vox
      sectionName: https

  hostnames:
    - "vox.example.com"   # ← update

  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: vox-frontend
          namespace: vox
          port: 80
          weight: 100
