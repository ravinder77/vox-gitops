apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vox-frontend-route
  namespace: vox
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  parentRefs:
    - name: vox-gateway
      namespace: vox
      sectionName: https

  hostnames:
    - "vox.example.com"   # ← update

  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: vox-frontend       # references Service created by helm/frontend chart
          namespace: vox
          port: 80
          weight: 100

---
apiVersion: elbv2.k8s.aws/v1beta1
kind: TargetGroupBinding
metadata:
  name: vox-frontend-tgb
  namespace: vox
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  serviceRef:
    name: vox-frontend
    port: 80
  targetType: ip
