apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vox-backend-route
  namespace: vox
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  parentRefs:
    - name: vox-gateway
      namespace: vox
      sectionName: https

  hostnames:
    - "api.vox.example.com"   # ← update

  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: vox-backend
          namespace: vox
          port: 4000
          weight: 100

    - matches:
        - path:
            type: PathPrefix
            value: /health
      backendRefs:
        - name: vox-backend
          namespace: vox
          port: 4000
