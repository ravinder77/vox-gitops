apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vox-loadbalancer-config
  namespace: vox-backend
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  # This route handles redirect from HTTP → HTTPS at the ALB level
  parentRefs:
    - name: vox-gateway
      namespace: vox-backend
      sectionName: http

  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
