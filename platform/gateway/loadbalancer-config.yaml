apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vox-loadbalancer-config
  namespace: vox
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  # Redirect cleartext HTTP traffic to HTTPS.
  parentRefs:
    - name: vox-gateway
      namespace: vox
      sectionName: http

  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
