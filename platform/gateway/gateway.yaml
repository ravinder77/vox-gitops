apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: vox-gateway
  namespace: vox-backend
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    # ALB annotations passed through Gateway — LBC reads these
    gateway.alb.ingress.kubernetes.io/scheme: internet-facing
    gateway.alb.ingress.kubernetes.io/target-type: ip
    gateway.alb.ingress.kubernetes.io/load-balancer-name: vox-alb
    gateway.alb.ingress.kubernetes.io/healthcheck-path: /healthz
    gateway.alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    gateway.alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    gateway.alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    gateway.alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"
    # SSL cert — ACM ARN
#    gateway.alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-south-1:123456789012:certificate/xxxx   # ← update
#    gateway.alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06
#    gateway.alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
#    gateway.alb.ingress.kubernetes.io/ssl-redirect: "443"
spec:
  gatewayClassName: aws-alb     # references gatewayclass.yaml

  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              gateway-access: "true"

    - name: https
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: vox-tls-cert    # or use ACM via annotation above
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              gateway-access: "true"
