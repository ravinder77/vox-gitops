apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vox-app-secrets
  namespace: vox
  labels:
    app.kubernetes.io/name: vox-app-secrets
    app.kubernetes.io/component: security
    app.kubernetes.io/managed-by: argocd
spec:
  refreshInterval: 30m
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: vox-app-secrets
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        DB_HOST: "{{ .db_host }}"
        DB_PORT: "{{ .db_port }}"
        DB_NAME: "{{ .db_name }}"
        DB_USER: "{{ .db_user }}"
        DB_PASSWORD: "{{ .db_password }}"
        JWT_SECRET: "{{ .jwt_secret }}"
        API_KEY: "{{ .api_key }}"
  data:
    - secretKey: db_host
      remoteRef:
        key: vox/app
        property: db_host
    - secretKey: db_port
      remoteRef:
        key: vox/app
        property: db_port
    - secretKey: db_name
      remoteRef:
        key: vox/app
        property: db_name
    - secretKey: db_user
      remoteRef:
        key: vox/app
        property: db_user
    - secretKey: db_password
      remoteRef:
        key: vox/app
        property: db_password
    - secretKey: jwt_secret
      remoteRef:
        key: vox/app
        property: jwt_secret
    - secretKey: api_key
      remoteRef:
        key: vox/app
        property: api_key
