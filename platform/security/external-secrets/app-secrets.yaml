apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vox-app-secrets
  namespace: vox
  annotations:
    argocd.argoproj.io/sync-wave: "2"   # after ClusterSecretStore in wave 1
spec:
  # Sync every 1 hour — reduces API calls while staying reasonably fresh
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secrets-manager    # references cluster-secret-store.yaml
    kind: ClusterSecretStore

  target:
    name: vox-app-secrets        # name of the Kubernetes Secret that will be created
    creationPolicy: Owner        # ESO owns and manages the lifecycle of this Secret
    template:
      type: Opaque
      # Optional: add labels so Grafana/Prometheus can find this secret
      metadata:
        labels:
          app.kubernetes.io/managed-by: external-secrets

  data:
    # Each entry maps an AWS Secrets Manager key → K8s Secret key
    - secretKey: DATABASE_URL
      remoteRef:
        key: vox/production/backend          # AWS Secrets Manager secret name
        property: database_url               # JSON field within the secret

    - secretKey: JWT_SECRET
      remoteRef:
        key: vox/production/backend
        property: jwt_secret

    #    - secretKey: REDIS_URL
    #      remoteRef:
    #        key: vox/production/backend
    #        property: redis_url

    - secretKey: GRAFANA_ADMIN_PASSWORD
      remoteRef:
        key: vox/production/monitoring
        property: grafana_admin_password

---
# Mirror the same secret into vox-frontend namespace for any shared secrets
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vox-frontend-secrets
  namespace: vox
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: vox-frontend-secrets
    creationPolicy: Owner
  data:
    - secretKey: VITE_PUBLIC_API_URL
      remoteRef:
        key: vox/production/frontend
        property: api_url
