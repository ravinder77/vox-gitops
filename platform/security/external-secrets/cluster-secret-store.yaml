apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
  # Cluster-scoped resource — can be referenced by ExternalSecrets in any namespace
  annotations:
    argocd.argoproj.io/sync-wave: "1"   # within security app, stores before secrets
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-south-1

      # IRSA auth — uses the ServiceAccount in external-secrets namespace
      # The SA (external-secret-sa.yaml) has an annotation pointing to the IAM role
      # created by Terraform with permissions: secretsmanager:GetSecretValue, DescribeSecret
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets       # matches external-secret-sa.yaml metadata.name
            namespace: external-secrets
