# vox-backend Helm values
# Image tag is managed by ArgoCD Image Updater — it writes back to this file
# via git commit on the main branch after detecting a new ECR digest.

image:
  repository: AWS_ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/vox-backend   # ← update account ID
  tag: 0.0.0    # managed by argocd-image-updater
  pullPolicy: IfNotPresent

# Replicas managed by Argo Rollouts — set here but ignored during canary
replicaCount: 2

service:
  type: ClusterIP
  port: 4000
  targetPort: 4000

# Resource requests/limits
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Horizontal Pod Autoscaler
hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Liveness and readiness probes
probes:
  liveness:
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 20
  readiness:
    path: /ready
    initialDelaySeconds: 5
    periodSeconds: 10

# Environment variables (non-secret)
env:
  NODE_ENV: production
  PORT: "4000"
  LOG_LEVEL: info

podLabels:
  app.kubernetes.io/part-of: vox

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  privileged: false
  runAsNonRoot: true
  runAsUser: 10001
  capabilities:
    drop:
      - ALL

# Secret env vars injected from ESO-managed Kubernetes Secret
# See: platform/security/external-secrets/app-secrets.yaml
envFromSecret: vox-app-secrets    # must match ExternalSecret target.name

# ServiceMonitor for Prometheus scraping
serviceMonitor:
  enabled: true
  namespace: monitoring
  interval: 30s
  path: /metrics

# Pod disruption budget
pdb:
  enabled: true
  minAvailable: 1

# Node affinity — prefer on-demand nodes for backend
affinity:
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
            - key: eks.amazonaws.com/capacityType
              operator: In
              values:
                - ON_DEMAND

# Namespace label required for Gateway allowedRoutes selector
namespaceLabels:
  gateway-access: "true"
