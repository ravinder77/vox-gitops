apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "vox-backend.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{ include "vox-backend.labels" . | nindent 4 }}
  annotations:
    # Image Updater annotation — tells it which image to watch on ECR
    argocd-image-updater.argoproj.io/image-list: backend={{ .Values.image.repository }}
    argocd-image-updater.argoproj.io/backend.update-strategy: digest
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: main
spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      {{ include "vox-backend.selectorLabels" . | nindent 6 }}

  template:
    metadata:
      labels:
        {{ include "vox-backend.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        # Force pod restart when secret changes
        checksum/secret: {{ include "vox-backend.secretRef" . | sha256sum }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      serviceAccountName: {{ include "vox-backend.fullname" . }}

      containers:
        - name: backend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}

          env:
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}

          envFrom:
            - secretRef:
                name: {{ .Values.envFromSecret }}   # vox-app-secrets from ESO

          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}

          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}

          resources:
            {{ toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}

      {{- with .Values.affinity }}
      affinity:
        {{ toYaml . | nindent 8 }}
      {{- end }}

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              {{ include "vox-backend.selectorLabels" . | nindent 14 }}

  # ─── Argo Rollouts Canary Strategy ─────────────────────────────────────────
  strategy:
    canary:
      # Stable and canary Services — LBC/Gateway routes traffic between them
      stableService: {{ include "vox-backend.fullname" . }}-stable
      canaryService: {{ include "vox-backend.fullname" . }}-canary

      # Traffic routing via AWS ALB TargetGroups
      trafficRouting:
        alb:
          ingress: vox-backend-route    # HTTPRoute name in platform/gateway/tg-backend.yaml
          servicePort: {{ .Values.service.port }}

      steps:
        # Step 1 — 10% canary traffic for 5 minutes
        - setWeight: 10
        - pause: { duration: 5m }

        # Step 2 — Check Prometheus metrics before proceeding
        - analysis:
            templates:
              - templateName: vox-backend-success-rate
            args:
              - name: service-name
                value: {{ include "vox-backend.fullname" . }}-canary

        # Step 3 — 30% canary
        - setWeight: 30
        - pause: { duration: 5m }

        # Step 4 — 60% canary
        - setWeight: 60
        - pause: { duration: 2m }

        # Step 5 — Full promotion (100%)
        # If any step fails, Rollout auto-aborts and rolls back to stable

      # Auto-abort on analysis failure
      autoPromotionEnabled: false   # require manual promotion after final step

---
# AnalysisTemplate — Prometheus query to validate canary health
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: vox-backend-success-rate
  namespace: {{ .Release.Namespace }}
spec:
  args:
    - name: service-name
  metrics:
    - name: success-rate
      interval: 1m
      count: 5
      successCondition: result[0] >= 0.95   # 95% success rate threshold
      failureLimit: 2
      provider:
        prometheus:
          address: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
          query: |
            sum(rate(http_requests_total{
              service="{{ "{{args.service-name}}" }}",
              status!~"5.."
            }[5m]))
            /
            sum(rate(http_requests_total{
              service="{{ "{{args.service-name}}" }}"
            }[5m]))
