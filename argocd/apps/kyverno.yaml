apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno
  namespace: argocd
  annotations:
    # Wave 1 — Kyverno CRDs must exist before any ClusterPolicy/Policy objects
    # Runs alongside aws-lbc and gateway-api-crds
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: vox

  source:
    repoURL: https://kyverno.github.io/kyverno
    chart: kyverno
    targetRevision: 3.2.6
    helm:
      releaseName: kyverno
      values: |
        # HA mode — 3 replicas across AZs
        replicaCount: 3

        admissionController:
          replicas: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          # Fail-open — if Kyverno is unavailable, requests are allowed through
          # Change to Fail for stricter posture once stable
          failurePolicy: Ignore

        backgroundController:
          replicas: 2
          resources:
            requests:
              cpu: 50m
              memory: 128Mi

        cleanupController:
          replicas: 1

        reportsController:
          replicas: 2

        # Metrics for Prometheus scraping
        serviceMonitor:
          enabled: true
          namespace: monitoring
          interval: 30s

        # Exclude ArgoCD and Kyverno system namespaces from policy enforcement
        # to avoid bootstrap deadlocks
        config:
          excludeGroups:
            - system:nodes
          excludeUsernames:
            - system:node
          excludeRoles:
            - ClusterRole/kyverno:admission-controller
            - ClusterRole/kyverno:background-controller
          resourceFilters:
            - "[Event,*,*]"
            - "[*,kube-system,*]"
            - "[*,kube-public,*]"
            - "[*,kube-node-lease,*]"
            - "[*,kyverno,*]"
            - "[*,argocd,*]"

        webhooksCleanup:
          enabled: true

        crds:
          install: true

  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - Replace=true   # needed for CRD upgrades
