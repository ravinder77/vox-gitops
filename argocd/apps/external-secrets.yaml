apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # Deploy after monitoring so ServiceMonitor CRDs already exist.
    argocd.argoproj.io/sync-wave: "-2"
spec:
  project: vox

  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 0.10.4
    helm:
      releaseName: external-secrets
      values: |
        fullnameOverride: external-secrets
        
        installCRDs: true

        # IRSA for Secrets Manager access
        serviceAccount:
          create: false
          name: external-secrets

        webhook:
          create: true
          serviceAccount:
            annotations:
              eks.amazonaws.com/role-arn: arn:aws:iam::${AWS_ACCOUNT_ID}:role/external-secrets-irsa-role

        certController:
          create: true
          serviceAccount:
            annotations:
              eks.amazonaws.com/role-arn: arn:aws:iam::${AWS_ACCOUNT_ID}:role/external-secrets-irsa-role

        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 256Mi

        metrics:
          listen:
            port: 8080
          service:
            enabled: true
            port: 8080
          serviceMonitor:
            enabled: true
            namespace: monitoring
            interval: 30s

        # Replication strategy for multi-namespace secrets
        replicaCount: 2

        podDisruptionBudget:
          enabled: true
          minAvailable: 1

  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m

