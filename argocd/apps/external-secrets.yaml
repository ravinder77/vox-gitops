apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "-3"  # must deploy before apps that consume secrets
  labels:
    app.kubernetes.io/name: external-secrets
    app.kubernetes.io/part-of: vox-platform
spec:
  project: vox-project
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 0.9.x
    helm:
      release-name: external-secrets
      values: |
        installCRDs: true
        replicaCount: 2
        
        serviceAccount:
          annotations:
            eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID>:role/external-secrets.io
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
        
        podDisruptionBudget:
          enabled: true
          minAvailable: 1
        
        metrics:
          service:
            enabled: true
            port: 8080
        
        webhook:
          replicaCount: 2
          podDisruptionBudget: 
            enabled: true
            minAvailable: 1
        
        certController:
          replicaCount: 2
          podDisruptionBudget:
            enabled: true
            minAvailable: 1
        
        affinity:
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  labelSelector:
                    matchExpressions:
                      - key: app.kubernetes.io/name
                        operator: In
                        values: 
                          - external-secrets
                  topologyKey: kubernetes.io/hostname
        
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - Replica=true          # needed for CRD updates
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m

---


# Cluster Secret Store - points to AWS Secrets Manager
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-store
  namespace: external-secrets
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-south-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets

  
