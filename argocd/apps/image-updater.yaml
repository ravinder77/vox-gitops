apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-image-updater
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: vox

  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argocd-image-updater
    targetRevision: 0.11.0
    helm:
      releaseName: argocd-image-updater
      values: |
        fullnameOverride: argocd-image-updater

        config:
          # Use ECR as the registry
          registries:
            - name: ECR ap-south-1
              api_url: https://<aws-account-id>.dkr.ecr.ap-south-1.amazonaws.com
              prefix: AWS_ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com
              ping: yes
              insecure: no
              credentials: ext:/scripts/ecr-login.sh
              credsexpire: 10h

        # ArgoCD server connection
        argocd:
          serverAddress: argocd-server.argocd.svc.cluster.local
          insecure: true
          grpcWeb: true

        # IRSA for ECR access
        serviceAccount:
          create: true
          annotations:
            eks.amazonaws.com/role-arn: arn:aws:iam::AWS_ACCOUNT_ID:role/argocd-image-updater-irsa-role

        # Git credentials for write-back
        authScripts:
          enabled: true
          scripts:
            ecr-login.sh: |
              #!/bin/sh
              aws ecr get-login-password --region ap-south-1

        # SSH key for git write-back (reference from secret)
        sshConfig:
          config: |
            Host github.com
              User git
              IdentityFile /app/.ssh/id_rsa
              StrictHostKeyChecking no

        extraEnv:
          - name: ARGOCD_IMAGE_UPDATER_LOGLEVEL
            value: info
          - name: AWS_REGION
            value: ap-south-1

        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi

        metrics:
          enabled: true
          serviceMonitor:
            enabled: true
            namespace: monitoring

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true