apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  project: vox
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 61.3.2
    helm:
      releaseName: monitoring
      values: |
        fullnameOverride: monitoring

        prometheus:
          prometheusSpec:
            retention: 15d
            storageSpec:
              volumeClaimTemplate:
                spec:
                  accessModes:
                    - ReadWriteOnce
                  resources:
                    requests:
                      storage: 50Gi
            resources:
              requests:
                memory: 2Gi
                cpu: 500m
              limits:
                memory: 4Gi

        grafana:
          enabled: true
          adminPassword: ""
          dashboardProviders:
            dashboardproviders.yaml:
              apiVersion: 1
              providers:
                - name: vox
                  folder: Vox
                  type: file
                  options:
                    path: /var/lib/grafana/dashboards/vox

        alertmanager:
          alertmanagerSpec:
            storage:
              volumeClaimTemplate:
                spec:
                  accessModes:
                    - ReadWriteOnce
                  resources:
                    requests:
                      storage: 10Gi
          config:
            global:
              slack_api_url: "https://hooks.slack.com/your-webhook"
            route:
              receiver: slack-platform
              routes:
                - matchers:
                    - severity="critical"
                  receiver: slack-critical
            receivers:
              - name: slack-platform
                slack_configs:
                  - channel: "#vox-alerts"
                    send_resolved: true
              - name: slack-critical
                slack_configs:
                  - channel: "#vox-oncall"
                    send_resolved: true

        additionalPrometheusRulesMap:
          vox-argocd:
            groups:
              - name: argocd.sync
                rules:
                  - alert: ArgoCDAppOutOfSync
                    expr: argocd_app_info{sync_status!="Synced"} == 1
                    for: 10m
                    labels:
                      severity: warning
                    annotations:
                      summary: "App {{ $labels.name }} out of sync"
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - Replace=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      jsonPointers:
        - /webhooks/0/clientConfig/caBundle
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      jsonPointers:
        - /webhooks/0/clientConfig/caBundle
