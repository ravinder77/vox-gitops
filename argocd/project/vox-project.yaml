apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: vox
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "-4"

spec:
  description: Vox GitOps Platform — production workloads on EKS ap-south-1

# ------- Allowed Source Repositories
  sourceRepos:
    - https://github.com/ravinder77/vox-gitops.git
    - https://github.com/ravinder77/vox.git
    - https://charts.external-secrets.io
    - https://argoproj.github.io/argo-helm
    - https://prometheus-community.github.io/helm-charts
    - https://helm.nginx.com/stable

# --------- Allowed destination clusters and namespaces ----
  destinations:
    - server: https://kubernetes.default.svc
      namespace: vox
    - server: https://kubernetes.default.svc
      namespace: argocd
    - server: https://kubernetes.default.svc
      namespace: monitoring
    - server: https://kubernetes.default.svc
      namespace: external-secrets
    - server: https://kubernetes.default.svc
      namespace: argo-rollouts


  # ── Namespace-scoped resources allowed ───────────────────────
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

  # ── Deny list — never deploy these ───────────────────────────
  namespaceResourceBlacklist:
    - group: ""
      kind: ResourceQuota
    - group: ""
      kind: LimitRange

  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
    - group: external-secrets.io
      kind: ClusterSecretStore

 # ---- RBAC Roles -----
  roles:
    - name: admin
      description: Full access to vox project
      policies:
        - p, proj:vox:admin, applications, *, vox/*, allow
      groups:
        - vox-admins

    - name: deployer
      description: CI/CD pipeline — can sync apps but not delete
      policies:
        - p, proj:vox:deployer, applications, get, vox/*, allow
        - p, proj:vox:deployer, applications, sync, vox/*, allow
        - p, proj:vox:deployer, applications, override, vox/*, allow
        - p, proj:vox:deployer, applications, delete, vox/*, deny
      groups:
        - vox-deployers

    - name: developer
      description: Read-only access to vox project
      policies:
        - p, proj:vox:developer, applications, get, vox/*, allow
        - p, proj:vox:developer, applications, sync, vox/*, deny
      groups:
        - vox-developers

    # ── Sync windows — no deploys on weekends ────────────────────
  syncWindows:
    - kind: allow
      schedule: "0 9 * * 1-5"    # Mon-Fri 09:00
      duration: 8h
      applications:
        "*"
      namespaces:
        - vox
      manualSync: true    # allow manual override in emergencies

    - kind: deny
      schedule: "0 0 * * 6,0"   # Sat–Sun all day
      duration: 48h
      applications:
        - "*"
      namespaces:
        - vox
      manualSync: false           # block even manual syncs on weekends





